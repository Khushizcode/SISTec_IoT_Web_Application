<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

    <nav class="bg-blue-600 text-white p-4 flex justify-between">

        <h1 class="text-2xl font-bold">
            SISTec IoT Application 2026
        </h1>

        <h1 id="username"></h1>

    </nav>

    <div class="p-6">

        <div class="grid md:grid-cols-2 gap-6">

            <div class="bg-white p-6 rounded shadow">

                <h1 class="text-xl font-bold mb-4">
                    Temperature
                </h1>

                <h1 id="temp"
                    class="text-5xl font-bold text-red-500">
                </h1>

                <p id="tempDate"></p>
                <p id="tempTime"></p>

            </div>

            <div class="bg-white p-6 rounded shadow">

                <h1 class="text-xl font-bold mb-4">
                    Humidity
                </h1>

                <h1 id="hum"
                    class="text-5xl font-bold text-blue-500">
                </h1>

                <p id="humDate"></p>
                <p id="humTime"></p>

            </div>

        </div>

        <div class="bg-white p-6 rounded shadow mt-8">

            <h1 class="text-2xl font-bold mb-4">
                LCD Display Text
            </h1>

            <form id="lcdForm">

                <textarea
                    maxlength="16"
                    id="lcdText"
                    class="w-full border p-4 rounded text-2xl"
                ></textarea>

                <button
                    class="bg-green-500 text-white p-3 rounded mt-4">

                    Submit

                </button>

            </form>

        </div>

        <div class="bg-white p-6 rounded shadow mt-8 overflow-auto">

            <h1 class="text-2xl font-bold mb-4">
                Sensor Records
            </h1>

            <table class="w-full border">

                <thead class="bg-gray-200">

                    <tr>

                        <th class="border p-2">#</th>
                        <th class="border p-2">Temperature</th>
                        <th class="border p-2">Humidity</th>
                        <th class="border p-2">Time</th>
                        <th class="border p-2">Date</th>
                        <th class="border p-2">Action</th>

                    </tr>

                </thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("username").innerText =
    params.get("name");

fetch("/api/latest")
.then(res => res.json())
.then(data => {

    document.getElementById("temp").innerText =
        data.temperature + " °C";

    document.getElementById("hum").innerText =
        data.humidity + " %";

    document.getElementById("tempDate").innerText =
        data.date;

    document.getElementById("tempTime").innerText =
        data.time;

    document.getElementById("humDate").innerText =
        data.date;

    document.getElementById("humTime").innerText =
        data.time;
});

fetch("/api/all")
.then(res => res.json())
.then(data => {

    let output = "";

    data.forEach((item, index) => {

        output += `
            <tr>

                <td class="border p-2">
                    ${index + 1}
                </td>

                <td class="border p-2">
                    ${item.temperature} °C
                </td>

                <td class="border p-2">
                    ${item.humidity} %
                </td>

                <td class="border p-2">
                    ${item.time}
                </td>

                <td class="border p-2">
                    ${item.date}
                </td>

                <td class="border p-2">

                    <a href="/delete/${item.id}"
                        class="bg-red-500 text-white px-3 py-1 rounded">

                        Delete

                    </a>

                </td>

            </tr>
        `;
    });

    document.getElementById("tableBody").innerHTML =
        output;
});

document.getElementById("lcdForm")
.addEventListener("submit", async(e) => {

    e.preventDefault();

    const text =
        document.getElementById("lcdText").value;

    await fetch("/save-lcd", {

        method: "POST",

        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },

        body: `text=${text}`
    });

    alert("LCD Text Saved");
});

</script>

</body>
</html>
